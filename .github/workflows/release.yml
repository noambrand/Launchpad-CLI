name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.4.3)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" ClaudeCode_Launchpad_CLI_Setup.nsi

      - name: Verify installer exists
        run: |
          if (!(Test-Path ClaudeCode_Launchpad_CLI_Setup.exe)) {
            Write-Error "Windows installer not built"
            exit 1
          }
          Write-Output "Windows installer size: $((Get-Item ClaudeCode_Launchpad_CLI_Setup.exe).Length) bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: ClaudeCode_Launchpad_CLI_Setup.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare scripts
        run: |
          chmod +x mac/scripts/postinstall
          cp source/statusline.mjs mac/scripts/statusline.mjs
          cp source/configure-statusline.js mac/scripts/configure-statusline.js
          cp -R source/sounds mac/scripts/sounds

      - name: Build .pkg
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          pkgbuild \
            --nopayload \
            --scripts mac/scripts \
            --identifier com.claudecode.launchpad \
            --version "$TAG" \
            --install-location / \
            ClaudeCode_Launchpad_CLI_Setup_mac.pkg

      - name: Verify pkg exists
        run: |
          ls -lh ClaudeCode_Launchpad_CLI_Setup_mac.pkg
          pkgutil --check-signature ClaudeCode_Launchpad_CLI_Setup_mac.pkg || true

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mac-installer
          path: ClaudeCode_Launchpad_CLI_Setup_mac.pkg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows installer
        uses: actions/download-artifact@v5
        with:
          name: windows-installer
          path: release-assets/

      - name: Download macOS installer
        uses: actions/download-artifact@v5
        with:
          name: mac-installer
          path: release-assets/

      - name: Stage standalone diagnostics tool
        run: |
          # Ship the diagnostics tool as a downloadable release asset so a user
          # whose install FAILED (and therefore has no Start-Menu shortcut) can
          # still grab it from the release page, run it, and email us the report.
          cp source/launchpad-diagnostics.cmd release-assets/
          ls -la release-assets/

      - name: Copy demo video (carry forward from a prior release if absent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VID="kivun_terminal_Hebrew_2_0_2.mp4"
          if [ -f "$VID" ]; then
            cp "$VID" release-assets/
          else
            echo "Demo video not in repo — carrying it forward from a previous release..."
            TAG="${{ github.ref_name }}"; [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
            for t in $(gh release list --limit 40 --json tagName --jq '.[].tagName'); do
              [ "$t" = "$TAG" ] && continue
              gh release download "$t" -p "$VID" -D release-assets/ 2>/dev/null && break || true
            done
          fi
          # The "Verify all required assets" step below fails the build if the
          # video is still missing — a release can never ship without it.

      - name: Verify all required assets exist
        run: |
          MISSING=0
          for f in \
            release-assets/ClaudeCode_Launchpad_CLI_Setup.exe \
            release-assets/ClaudeCode_Launchpad_CLI_Setup_mac.pkg \
            release-assets/launchpad-diagnostics.cmd \
            release-assets/kivun_terminal_Hebrew_2_0_2.mp4; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f ($(stat --format=%s "$f") bytes)"
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "::error::Release is missing required assets. Aborting."
            exit 1
          fi
          echo "All required release assets present."

      - name: Generate release notes from template
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          sed "s/TAG_PLACEHOLDER/$TAG/g" .github/RELEASE_TEMPLATE.md > release-notes.md
          # Fill the "What's new" placeholder with this version's CHANGELOG
          # section (plain-English), so the section is never left empty.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { f=1; next }
            /^## \[/ { if (f) exit }
            f { print }
          ' docs/CHANGELOG.md > /tmp/whatsnew.md
          if [ ! -s /tmp/whatsnew.md ]; then
            echo "See the [CHANGELOG](https://github.com/noambrand/launchpad-cli/blob/main/docs/CHANGELOG.md) for details." > /tmp/whatsnew.md
          fi
          awk 'FNR==NR { a[++n]=$0; next }
               /<!-- Fill in release-specific changes here -->/ { for (i=1;i<=n;i++) print a[i]; next }
               { print }' /tmp/whatsnew.md release-notes.md > release-notes.tmp && mv release-notes.tmp release-notes.md
          # Append auto-generated changelog from git
          echo "" >> release-notes.md
          echo "## Commits since last release" >> release-notes.md
          echo "" >> release-notes.md
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            git log --oneline "${PREV_TAG}..${TAG}" | while read line; do
              echo "- $line" >> release-notes.md
            done
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — refreshing notes and assets..."
            gh release edit "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" release-assets/* --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" release-assets/* \
              --title "ClaudeCode Launchpad CLI $TAG" \
              --notes-file release-notes.md \
              --latest
          fi

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          echo "Release assets for $TAG:"
          gh release view "$TAG" --json assets --jq '.assets[] | "  \(.name) (\(.size) bytes)"'
